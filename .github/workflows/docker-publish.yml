# Build and push Docker image to ghcr.io and Docker Hub
#
# ghcr.io: uses GITHUB_TOKEN; image is ghcr.io/<github.repository> (e.g. ghcr.io/Darknetzz/webhooks).
#   Enable "Read and write packages" in repo Settings → Actions → General.
# Docker Hub: add secret DOCKERHUB_TOKEN and repo variable PUBLISH_TO_DOCKER_HUB=true (Settings →
#   Secrets and variables → Actions). Username can differ from GitHub (e.g. darknetz vs Darknetzz).
#
# We only push on release and on push to dev to avoid a new digest on every merge to main (which
# created many untagged digests). Result: :latest and semver on release; :dev on push to dev.

name: Docker publish

on:
  push:
    branches: [dev]
  release:
    types: [published]

env:
  REGISTRY_GHCR: ghcr.io
  DOCKERHUB_USERNAME: darknetz
  DOCKERHUB_IMAGE: darknetz/php-webhooks

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta (ghcr.io)
        id: meta-ghcr
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_GHCR }}/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.event_name == 'release' }}

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-ghcr.outputs.tags }}
          labels: ${{ steps.meta-ghcr.outputs.labels }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            GIT_TAG=${{ github.event.release.tag_name || '' }}
            GIT_REPO_URL=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker meta (Docker Hub)
        if: github.event_name != 'pull_request' && vars.PUBLISH_TO_DOCKER_HUB == 'true'
        id: meta-dh
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_IMAGE || env.DOCKERHUB_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.event_name == 'release' }}

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request' && vars.PUBLISH_TO_DOCKER_HUB == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME || env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push to Docker Hub
        if: github.event_name != 'pull_request' && vars.PUBLISH_TO_DOCKER_HUB == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta-dh.outputs.tags }}
          labels: ${{ steps.meta-dh.outputs.labels }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            GIT_TAG=${{ github.event.release.tag_name || '' }}
            GIT_REPO_URL=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
